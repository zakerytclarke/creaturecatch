name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the action can push the built site to the gh-pages branch
# and update docs/ on main for branch-based Pages.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Keep a built copy in docs/ so Pages can serve from main / docs.
      - name: Sync built site into docs/
        run: |
          cp dist/index.html docs/index.html
          cp dist/review.html docs/review.html
          rm -rf docs/assets
          cp -r dist/assets docs/assets
          touch docs/.nojekyll

      - name: Commit docs site to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update GitHub Pages site in docs/ [skip ci]'
          file_pattern: docs/index.html docs/review.html docs/assets/* docs/.nojekyll

      # Also publish to the gh-pages branch (preferred Pages source).
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
